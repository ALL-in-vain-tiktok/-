<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>雪漫生日快乐 · 粒子照片</title>

<style>

body{
margin:0;
background:#070716;
overflow:hidden;
font-family:"Microsoft YaHei",sans-serif;
}

canvas{
position:absolute;
top:0;
left:0;
}

#title{
position:absolute;
top:6%;
width:100%;
text-align:center;
font-size:36px;
color:white;
text-shadow:0 0 20px #ff99cc,0 0 40px #ff66b2;
z-index:10;
letter-spacing:2px;
pointer-events:none;
}

.footer{
position:fixed;
bottom:15px;
width:100%;
text-align:center;
color:#ffb6c1;
font-size:16px;
z-index:10;
text-shadow:0 0 8px #ff3388;
background:rgba(7,7,22,0.3);
padding:4px 0;
backdrop-filter:blur(2px);
}

#loading{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:#aaa;
font-size:14px;
display:none;
z-index:20;
}

</style>
</head>

<body>

<div id="title">✨ 雪漫生日快乐 ✨</div>
<div id="loading">⏳ 正在加载照片...</div>

<canvas id="canvas"></canvas>

<div class="footer">来自了无益的一点小惊喜 🎁 生日快乐，雪漫！</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")
const title=document.getElementById("title")
const loading=document.getElementById("loading")

canvas.width=innerWidth
canvas.height=innerHeight

window.addEventListener("resize",()=>{
canvas.width=innerWidth
canvas.height=innerHeight
stars=[]
createStars()
})

let particles=[]
let targets=[]
let stars=[]
let photoMode=false

class Particle{

constructor(t){

this.x=Math.random()*canvas.width
this.y=Math.random()*canvas.height

this.tx=t.x
this.ty=t.y

this.vx=(Math.random()-0.5)*40
this.vy=(Math.random()-0.5)*40

this.size=t.size
this.color=t.color

}

update(){

this.vx*=0.8
this.vy*=0.8

this.x+=this.vx
this.y+=this.vy

let speed=photoMode?0.14:0.07

this.x+=(this.tx-this.x)*speed
this.y+=(this.ty-this.y)*speed

}

draw(){

ctx.beginPath()
ctx.arc(this.x,this.y,this.size,0,Math.PI*2)

ctx.shadowColor=this.color
ctx.shadowBlur=12
ctx.fillStyle=this.color

ctx.fill()

}

}

function createParticles(){

particles=[]

targets.forEach(t=>{
particles.push(new Particle(t))
})

}

function animate(){

if(photoMode){
ctx.fillStyle="rgba(7,7,22,1)"
}else{
ctx.fillStyle="rgba(7,7,22,0.4)"
}

ctx.fillRect(0,0,canvas.width,canvas.height)

drawStars()

particles.forEach(p=>{
p.update()
p.draw()
})

requestAnimationFrame(animate)

}

animate()

function createStars(){

for(let i=0;i<140;i++){

stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.3+0.1
})

}

}

function drawStars(){

ctx.fillStyle="white"

stars.forEach(s=>{

s.y+=s.speed

if(s.y>canvas.height){
s.y=0
s.x=Math.random()*canvas.width
}

ctx.beginPath()
ctx.arc(s.x,s.y,s.size,0,Math.PI*2)
ctx.fill()

})

}

createStars()

// 第一阶段文字
function createTextParticles(){

let temp=document.createElement("canvas")
let tctx=temp.getContext("2d")

temp.width=canvas.width
temp.height=canvas.height

tctx.fillStyle="white"
tctx.textAlign="center"

tctx.font="bold 120px Microsoft YaHei"
tctx.fillText("生日快乐",canvas.width/2,canvas.height/2-80)

tctx.font="bold 100px Microsoft YaHei"
tctx.fillText("雪漫",canvas.width/2,canvas.height/2+80)

let data=tctx.getImageData(0,0,temp.width,temp.height).data

targets=[]

for(let y=0;y<temp.height;y+=6){
for(let x=0;x<temp.width;x+=6){

let i=(y*temp.width+x)*4

if(data[i+3]>150){

targets.push({
x:x,
y:y,
color:`hsl(${(x+y)%360},90%,70%)`,
size:2
})

}

}
}

createParticles()

}

// 心形
function createHeart(){

targets=[]

let cx=canvas.width/2
let cy=canvas.height/2+80
let size=Math.min(canvas.width,canvas.height)*0.22

for(let i=0;i<450;i++){

let t=(i/450)*Math.PI*2

let x=16*Math.pow(Math.sin(t),3)
let y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))

targets.push({
x:cx+x*size*0.04,
y:cy+y*size*0.04,
color:"hsl(330,90%,70%)",
size:2.3
})

}

createParticles()

}

// 展示文字
function createShowText(){

let temp=document.createElement("canvas")
let tctx=temp.getContext("2d")

temp.width=canvas.width
temp.height=canvas.height

tctx.fillStyle="white"
tctx.textAlign="center"

tctx.font="bold 70px Microsoft YaHei"
tctx.fillText("下面请欣赏",canvas.width/2,canvas.height/2-40)

tctx.font="bold 80px Microsoft YaHei"
tctx.fillText("今天最美的大美女！",canvas.width/2,canvas.height/2+60)

let data=tctx.getImageData(0,0,temp.width,temp.height).data

targets=[]

for(let y=0;y<temp.height;y+=6){
for(let x=0;x<temp.width;x+=6){

let i=(y*temp.width+x)*4

if(data[i+3]>150){

targets.push({
x:x,
y:y,
color:"hsl(330,90%,70%)",
size:2.2
})

}

}
}

createParticles()

}

// 图片处理（使用第一版算法）
function processImage(img){

photoMode=true

let temp=document.createElement("canvas")
let tctx=temp.getContext("2d")

let w=380
let h=w*(img.height/img.width)

temp.width=w
temp.height=h

tctx.drawImage(img,0,0,w,h)

let data=tctx.getImageData(0,0,w,h).data

targets=[]

for(let y=0;y<h;y+=2){
for(let x=0;x<w;x+=2){

let i=(y*w+x)*4

let r=data[i]
let g=data[i+1]
let b=data[i+2]

let scale=canvas.height*0.8/h

let px=x*scale
let py=y*scale

px+=(canvas.width-w*scale)/2
py+=canvas.height*0.1

targets.push({
x:px,
y:py,
color:`rgb(${r},${g},${b})`,
size:1.6
})

}
}

createParticles()

}

function loadImage(url){

loading.style.display="block"

let img=new Image()

img.crossOrigin="anonymous"

img.onload=()=>{
loading.style.display="none"
processImage(img)
}

img.onerror=()=>{
loading.style.display="none"
console.warn("图片加载失败")
createHeart()
}

img.src=url

}

// 启动流程

createTextParticles()

setTimeout(()=>{
createHeart()
title.innerText="❤️ 生日快乐啊，小粉毛 ❤️"
},4000)

setTimeout(()=>{
createShowText()
title.innerText="✨ 下面请欣赏今天最美的大美女 ✨"
},8000)

setTimeout(()=>{

let url="https://user4091.cn.imgto.link/public/20260310/d5f889c890319569f762ac4462c3d2e4.avif"

loadImage(url)

},12000)

</script>

</body>
</html>
